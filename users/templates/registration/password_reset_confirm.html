{% extends 'myapp/base.html' %}

{% block title %}Set New Password{% endblock %}

{% block content %}

<div class="max-w-md mx-auto">

    <div class="bg-gradient-to-r from-indigo-600 to-blue-500 rounded-2xl p-6 text-white shadow-lg mb-6">
        <h1 class="text-xl font-semibold">Set New Password</h1>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-md">

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-gray-600 mb-1">New Password</label>
                {{ form.new_password1 }}
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-1">Confirm Password</label>
                {{ form.new_password2 }}
            </div>

            {% if form.errors %}
                <p class="text-red-500 text-sm">{{ form.errors }}</p>
            {% endif %}

            <button class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                Reset Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
