{% extends 'myapp/base.html' %}

{% block title %}Password Reset Successful{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4">

<div class="w-full max-w-md">

    <div class="bg-gradient-to-r from-indigo-600 to-blue-500 rounded-2xl p-6 text-white shadow-lg mb-6 text-center">
        <h2 class="text-xl font-semibold">Password Reset Successful</h2>
        <p class="text-sm text-indigo-100 mt-1">
            Your password has been updated
        </p>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-md text-center space-y-4">

        <p class="text-gray-600 text-sm">
            You can now log in with your new password.
        </p>

        <a href="{% url 'login' %}" 
           class="inline-block w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition">
            Go to Login
        </a>

    </div>

</div>

</div>

{% endblock %}
