{% extends 'myapp/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="max-w-md mx-auto">

    <div class="bg-gradient-to-r from-indigo-600 to-blue-500 rounded-2xl p-6 text-white shadow-lg mb-6">
        <h1 class="text-xl font-semibold">Welcome back</h1>
        <p class="text-sm text-indigo-100">Login to continue</p>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-md">

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-600 mb-1">Username</label>
                <input type="text" name="username"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Password</label>
                <input type="password" name="password"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
            </div>

            {% if form.errors %}
                <p class="text-red-500 text-sm">Invalid credentials</p>
            {% endif %}

            <button class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                Login
            </button>

        </form>

        <p class="text-sm text-gray-500 mt-4 text-center">
            Don’t have an account?
            <a href="{% url 'register' %}" class="text-indigo-600 hover:underline">Register</a>
        </p>
        <div class="flex items-center mt-4 justify-center">
        <a href="{% url 'password_reset' %}" class="text-indigo-600 text-lg hover:underline">Forgot Password?</a>
        </div>
    </div>

</div>

{% endblock %}
