{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CV Manager{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            
            <a href="{% url 'dashboard' %}" class="text-lg font-semibold text-indigo-600">
                CV Manager
            </a>

            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                    <span class="text-sm text-gray-600 hidden sm:block">
                        {{ user.username }}
                    </span>

                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="bg-red-500 text-white px-4 py-1.5 rounded-md hover:bg-red-600">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="bg-indigo-500 text-white px-4 py-1.5 rounded-md hover:bg-indigo-600">
                        Login
                    </a>

                    <a href="{% url 'register' %}" class="border border-indigo-500 text-indigo-500 px-4 py-1.5 rounded-md hover:bg-indigo-50">
                        Register
                    </a>
                {% endif %}
            </div>

        </div>
    </nav>

    <main class="flex-grow">
        <div class="max-w-6xl mx-auto px-4 py-6">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="text-center text-gray-500 text-sm py-4">
        © CV Manager
    </footer>

</body>
</html>
